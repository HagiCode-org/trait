localesRoot: src/i18n/locales-source
repoRoot: .
baseLocale: en-US
targetLocales:
  - zh-CN
  - zh-Hant
  - ja-JP
  - ko-KR
  - de-DE
  - fr-FR
  - es-ES
  - pt-BR
  - ru-RU
doctor:
  excludedDirectories:
    - .astro
    - .git
    - coverage
    - dist
    - node_modules
    - src/data/generated
    - src/i18n/locales
  textFileExtensions:
    - .ts
    - .tsx
    - .js
    - .jsx
    - .mjs
    - .cjs
    - .json
    - .md
    - .yml
    - .yaml
  allowlist:
    legacy-language-change-call: []
    legacy-locale-path: []
    legacy-ui-language-literal:
      - scripts/agent-sources.mjs
      - scripts/sync-agents.test.mjs
      - src/components/home/HomePageShell.test.tsx
      - src/lib/agent-markdown.test.ts
    legacy-ui-language-union: []
